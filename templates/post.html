<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #111118;
    --bg-card: #16161f;
    --bg-card-hover: #1c1c28;
    --accent: #4af0c0;
    --accent-dim: rgba(74, 240, 192, 0.12);
    --accent-glow: rgba(74, 240, 192, 0.25);
    --text-primary: #e8e8ed;
    --text-secondary: #9898a8;
    --text-dim: #606070;
    --border: rgba(255,255,255,0.06);
    --font-display: 'Space Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.7;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  .container {
    max-width: 1080px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 20px 0;
    background: rgba(10, 10, 15, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  nav .container { display: flex; justify-content: space-between; align-items: center; }
  .logo {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: lowercase;
    color: var(--text-primary);
    text-decoration: none;
  }
  .logo span { color: var(--accent); }
  .nav-cta {
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--bg-primary);
    background: var(--accent);
    padding: 10px 24px;
    text-decoration: none;
    transition: all 0.3s ease;
  }
  .nav-cta:hover { box-shadow: 0 0 30px var(--accent-glow); transform: translateY(-1px); }

  /* BUTTONS */
  .btn-primary {
    display: inline-block;
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--bg-primary);
    background: var(--accent);
    padding: 18px 40px;
    text-decoration: none;
    transition: all 0.3s ease;
  }
  .btn-primary:hover { box-shadow: 0 0 40px var(--accent-glow); transform: translateY(-2px); }
  .btn-secondary {
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.3s ease;
  }
  .btn-secondary:hover { color: var(--accent); }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 48px 0;
    text-align: center;
  }
  footer .logo { display: block; margin-bottom: 16px; }
  footer p { font-size: 13px; color: var(--text-dim); }
  footer p a { color: var(--text-dim); text-decoration: none; transition: color 0.2s ease; }
  footer p a:hover { color: var(--accent); }

  /* POST HEADER */
  .post-header {
    padding: 120px 0 64px;
    background: var(--bg-primary);
    border-bottom: 1px solid var(--border);
  }
  .post-header h1 {
    font-family: var(--font-display);
    font-size: clamp(24px, 4vw, 48px);
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.5px;
    margin-top: 24px;
    max-width: 800px;
  }

  /* POST BODY */
  .post-body { padding: 72px 0 100px; }

  .post-content {
    max-width: 720px;
    font-size: 17px;
    line-height: 1.85;
    color: var(--text-secondary);
  }
  .post-content h2, .post-content h3, .post-content h4 {
    font-family: var(--font-display);
    color: var(--text-primary);
    margin: 52px 0 16px;
    line-height: 1.3;
  }
  .post-content h2 { font-size: clamp(20px, 2.5vw, 26px); }
  .post-content h3 { font-size: clamp(17px, 2vw, 21px); }
  .post-content h4 { font-size: 17px; }
  .post-content p { margin-bottom: 24px; }
  .post-content a { color: var(--accent); text-decoration: none; }
  .post-content a:hover { text-decoration: underline; }
  .post-content strong { color: var(--text-primary); font-weight: 600; }
  .post-content ul, .post-content ol { padding-left: 28px; margin-bottom: 24px; }
  .post-content li { margin-bottom: 10px; }
  .post-content blockquote {
    border-left: 3px solid var(--accent);
    padding: 4px 0 4px 28px;
    margin: 36px 0;
  }
  .post-content blockquote p { color: var(--text-primary); font-style: italic; margin-bottom: 0; }
  .post-content code {
    font-family: var(--font-display);
    font-size: 13px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 2px 8px;
    color: var(--accent);
  }
  .post-content pre {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 24px;
    margin-bottom: 24px;
    overflow-x: auto;
  }
  .post-content pre code { background: none; border: none; padding: 0; color: var(--text-primary); }
  .post-content hr { border: none; border-top: 1px solid var(--border); margin: 52px 0; }
  .post-content img { max-width: 100%; display: block; margin: 32px 0; }

  .post-footer {
    max-width: 720px;
    margin-top: 72px;
    padding-top: 40px;
    border-top: 1px solid var(--border);
  }

  /* TAGS */
  .post-tags { display: flex; flex-wrap: wrap; gap: 10px; }
  .post-tag {
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(74, 240, 192, 0.25);
    padding: 5px 12px;
    text-decoration: none;
    transition: all 0.2s ease;
  }
  .post-tag:hover { background: var(--accent-dim); }

  @media (max-width: 768px) {
    .post-header { padding: 100px 0 48px; }
    .post-body { padding: 48px 0 72px; }
  }
</style>
