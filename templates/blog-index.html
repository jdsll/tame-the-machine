<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Tame the Machine</title>
<meta name="description" content="AI automation insights for small service businesses — practical guides on saving time, building workflows, and letting machines handle the repetitive work.">
<meta property="og:type" content="website">
<meta property="og:title" content="Blog — Tame the Machine">
<meta property="og:description" content="AI automation insights for small service businesses.">
<meta property="og:image" content="https://tamethemachine.com/assets/og-default.svg">
<meta property="og:url" content="https://tamethemachine.com/blog">
<link rel="alternate" type="application/rss+xml" title="Tame the Machine Blog" href="/blog/rss.xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #111118;
    --bg-card: #16161f;
    --bg-card-hover: #1c1c28;
    --accent: #4af0c0;
    --accent-dim: rgba(74, 240, 192, 0.12);
    --accent-glow: rgba(74, 240, 192, 0.25);
    --text-primary: #e8e8ed;
    --text-secondary: #9898a8;
    --text-dim: #606070;
    --border: rgba(255,255,255,0.06);
    --font-display: 'Space Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.7;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  .container { max-width: 1080px; margin: 0 auto; padding: 0 24px; }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 20px 0;
    background: rgba(10, 10, 15, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  nav .container { display: flex; justify-content: space-between; align-items: center; }
  .logo {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: lowercase;
    color: var(--text-primary);
    text-decoration: none;
  }
  .logo span { color: var(--accent); }
  .nav-cta {
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--bg-primary);
    background: var(--accent);
    padding: 10px 24px;
    text-decoration: none;
    transition: all 0.3s ease;
  }
  .nav-cta:hover { box-shadow: 0 0 30px var(--accent-glow); transform: translateY(-1px); }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 48px 0;
    text-align: center;
  }
  footer .logo { display: block; margin-bottom: 16px; }
  footer p { font-size: 13px; color: var(--text-dim); }
  footer p a { color: var(--text-dim); text-decoration: none; transition: color 0.2s ease; }
  footer p a:hover { color: var(--accent); }

  /* BLOG HERO */
  .blog-hero {
    padding: 140px 0 72px;
    background: var(--bg-primary);
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .blog-hero::before {
    content: '';
    position: absolute;
    top: -20%;
    right: -15%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(74, 240, 192, 0.05) 0%, transparent 70%);
    pointer-events: none;
  }
  .blog-hero-tag {
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }
  .blog-hero h1 {
    font-family: var(--font-display);
    font-size: clamp(28px, 4vw, 52px);
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.5px;
    margin-bottom: 20px;
  }
  .blog-hero-sub {
    font-size: 18px;
    color: var(--text-secondary);
    max-width: 560px;
    line-height: 1.8;
  }

  /* BLOG LISTING */
  .blog-listing { padding: 80px 0 100px; }
  .posts-grid { display: grid; gap: 24px; }

  .post-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 44px;
    transition: all 0.3s ease;
  }
  .post-card:hover {
    background: var(--bg-card-hover);
    border-color: rgba(74, 240, 192, 0.15);
    transform: translateY(-2px);
  }
  .post-card-meta { margin-bottom: 16px; }
  .post-card-title {
    font-family: var(--font-display);
    font-size: clamp(18px, 2.2vw, 24px);
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 16px;
  }
  .post-card-title a { color: var(--text-primary); text-decoration: none; }
  .post-card-title a:hover { color: var(--accent); }
  .post-card-excerpt {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 24px;
    max-width: 700px;
  }
  .post-card-link {
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    text-decoration: none;
    transition: opacity 0.2s ease;
  }
  .post-card-link:hover { opacity: 0.7; }

  /* TAGS */
  .post-tags { display: flex; flex-wrap: wrap; gap: 10px; }
  .post-tag {
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(74, 240, 192, 0.25);
    padding: 5px 12px;
    text-decoration: none;
    transition: all 0.2s ease;
  }
  .post-tag:hover { background: var(--accent-dim); }

  .no-posts {
    font-size: 17px;
    color: var(--text-secondary);
    padding: 60px 0;
    text-align: center;
  }

  @media (max-width: 768px) {
    .blog-hero { padding: 110px 0 56px; }
    .post-card { padding: 32px 28px; }
    .blog-listing { padding: 56px 0 80px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="container">
    <a href="/" class="logo">Tame<span>_</span>the<span>_</span>Machine</a>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSc9dpPLiOfucB1vzdkugCdew_-FYSm90djBuf_d1avja6_Mqg/viewform?usp=header" class="nav-cta" target="_blank" rel="noopener noreferrer">Get Your Free Audit</a>
  </div>
</nav>

<!-- BLOG HERO -->
<section class="blog-hero">
  <div class="container">
    <div class="blog-hero-tag">Insights &amp; Guides</div>
    <h1>The Machine Blog</h1>
    <p class="blog-hero-sub">Practical AI automation for small service businesses. No hype, no fluff — just what works.</p>
  </div>
</section>

<!-- POSTS LISTING -->
<section class="blog-listing">
  <div class="container">
    <div class="posts-grid">
      <!--POSTS_LIST-->
    </div>
  </div>

<!-- FOOTER -->
<footer>
  <div class="container">
    <a href="/" class="logo">Tame<span>_</span>the<span>_</span>Machine</a>
    <p>&copy; 2026 Tame the Machine AI Agency &middot; Healdsburg, CA &middot; <a href="/blog">Blog</a></p>
  </div>
</footer>

</body>
</html>
